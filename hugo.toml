baseURL = "https://your-blog.pages.dev"
languageCode = "zh-cn"
title = "我的博客"
theme = "PaperMod"
paginate = 10

enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false

[minify]
  disableXML = true
  minifyOutput = true

[params]
  env = "production"
  title = "我的博客"
  description = "记录生活与技术的地方"
  keywords = ["Blog", "Portfolio", "PaperMod"]
  author = "博主"
  # author = ["Me", "You"] # multiple authors

  defaultTheme = "auto"       # dark, light, or auto
  disableThemeToggle = false

  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCount = true
  ShowRssButtonInSectionTermList = true
  UseHugoToc = true
  disableSpecial1stPost = false
  disableScrollToTop = false
  comments = false
  hidemeta = false
  hideSummary = false
  showtoc = false
  tocopen = false

  [params.assets]
    # disableHLJS = true # to disable highlight.js
    # disableFingerprinting = true
    favicon = "/images/favicon.ico"
    favicon16x16 = "/images/favicon-16x16.png"
    favicon32x32 = "/images/favicon-32x32.png"
    apple_touch_icon = "/images/apple-touch-icon.png"
    safari_pinned_tab = "/images/safari-pinned-tab.svg"

  [params.label]
    text = "我的博客"
    icon = "/apple-touch-icon.png"
    iconHeight = 35

  [params.profileMode]
    enabled = true
    title = "你好，欢迎来到我的博客 👋"
    subtitle = "这里是我记录技术、生活和思考的地方"
    imageUrl = "/images/avatar.png"
    imageWidth = 120
    imageHeight = 120
    imageTitle = "Avatar"
    [[params.profileMode.buttons]]
      name = "文章"
      url = "/posts"
    [[params.profileMode.buttons]]
      name = "关于"
      url = "/about"

  [params.homeInfoParams]
    Title = "你好 👋"
    Content = "欢迎来到我的博客"

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/your-username"

  [[params.socialIcons]]
    name = "twitter"
    url = "https://twitter.com/your-username"

  [[params.socialIcons]]
    name = "rss"
    url = "/index.xml"

  [params.analytics.google]
    SiteVerificationTag = ""

  [params.cover]
    hidden = true
    hiddenInList = true
    hiddenInSingle = true

  [params.editPost]
    URL = "https://github.com/your-username/my-blog/tree/main/content"
    Text = "建议修改"
    appendFilePath = true

  [params.fuseOpts]
    isCaseSensitive = false
    shouldSort = true
    location = 0
    distance = 1000
    threshold = 0.4
    minMatchCharLength = 0
    limit = 10
    keys = ["title", "permalink", "summary", "content"]

[menu]
  [[menu.main]]
    identifier = "posts"
    name = "文章"
    url = "/posts/"
    weight = 10
  [[menu.main]]
    identifier = "categories"
    name = "分类"
    url = "/categories/"
    weight = 20
  [[menu.main]]
    identifier = "tags"
    name = "标签"
    url = "/tags/"
    weight = 30
  [[menu.main]]
    identifier = "about"
    name = "关于"
    url = "/about/"
    weight = 40
  [[menu.main]]
    identifier = "search"
    name = "搜索"
    url = "/search/"
    weight = 50

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[outputs]
  home = ["HTML", "RSS", "JSON"]
